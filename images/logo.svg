<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e676"/>
      <stop offset="55%"  stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="16" fill="url(#bgGrad)"/>

  <!-- Icon circle -->
  <circle cx="60" cy="60" r="38" fill="#161616" stroke="#222" stroke-width="1"/>

  <!-- Lightning bolt -->
  <polygon points="55,28 68,54 61,54 67,88 50,62 58,62" fill="#00e676"/>

  <!-- FlowState wordmark -->
  <text x="114" y="52" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="800" letter-spacing="-0.5" fill="#ffffff">Flow</text>
  <text x="192" y="52" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="800" letter-spacing="-0.5" fill="#00e676">State</text>

  <!-- Tagline -->
  <text x="115" y="72" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="400" fill="#555" letter-spacing="0.2">
    Know when your AI starts forgetting
  </text>

  <!-- Quality degradation sparkline -->
  <polyline
    points="114,104 148,95 182,92 216,89 250,88 284,82 318,72 352,58 386,44 420,34 454,24"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"/>

  <!-- Dots on the line -->
  <circle cx="114" cy="104" r="3" fill="#00e676" opacity="0.8"/>
  <circle cx="216" cy="89"  r="3" fill="#00e676" opacity="0.8"/>
  <circle cx="318" cy="72"  r="3" fill="#ff8800" opacity="0.8"/>
  <circle cx="386" cy="44"  r="3" fill="#ff4444" opacity="0.8"/>
  <circle cx="454" cy="24"  r="3" fill="#ff4444" opacity="0.8"/>
</svg>
